
name: Deploy to Hugging Face Space
on:
  push:
    branches: [ main, master ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
      - name: Clone Hugging Face Space
        run: |
          git clone --depth 1 https://huggingface.co/spaces/aditya-ranjan1234/identitylens-ai hf-space
      - name: Copy files to HF Space repo
        run: |
          rm -rf hf-space/* hf-space/.* 2>/dev/null || true
          shopt -s extglob dotglob
          cp -r !(hf-space) hf-space/ || true
          shopt -u extglob dotglob
      - name: Commit and Push to Hugging Face
        run: |
          cd hf-space
          git remote set-url origin https://aditya-ranjan1234:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/aditya-ranjan1234/identitylens-ai
          git add --all
          git commit -m "Auto-deploy from GitHub" || git commit --allow-empty -m "Auto-deploy from GitHub"
          git push origin main --force
