
name: Deploy to Hugging Face Space
on:
  push:
    branches: [ main, master ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
      - name: Prepare deployment snapshot
        run: |
          mkdir hf-space
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'hf-space/' \
            --exclude 'venv/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'frontend/.next/' \
            ./ hf-space/
      - name: Push snapshot to Hugging Face
        run: |
          cd hf-space
          git init
          git checkout -B main
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add --all
          git commit -m "Auto-deploy from GitHub"
          git remote add origin https://aditya-ranjan1234:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/aditya-ranjan1234/identitylens-ai
          git push origin main --force
